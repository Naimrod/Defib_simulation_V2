<!DOCTYPE html>
<html>
<head>
    <title>Apprentissage à la défibrillation</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #2c3e50; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { margin-bottom: 40px; font-size: 2.5em; }
        .menu-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        
        /* Styling for the clickable cards */
        .menu-card { 
            background: #34495e; 
            padding: 40px; 
            border-radius: 12px; 
            text-align: center; 
            width: 250px; 
            text-decoration: none; /* Removes the underline from links */
            color: white; 
            transition: transform 0.2s, background 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        
        /* Make it pop when hovering */
        .menu-card:hover { 
            transform: translateY(-5px); 
            background: #3b536b; 
        }
        
        .menu-card h2 { margin-top: 0; color: #ffffff; }
        .menu-card p { color: #bdc3c7; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>Outil d'entrainement aux techniques de défibrillation</h1>
    
    <div class="menu-container">
        <a href="/dashboard" class="menu-card">
            <h2>📊 Dashboard</h2>
            <p>View live medical data from all active sensors in real-time.</p>
        </a>
        
        <a href="/control" class="menu-card">
            <h2>🎛️ Control Panel</h2>
            <p>Manually input and push simulated data to the system.</p>
        </a>
        <a href="/scope" class="menu-card">
            <h2>📈 Scope View</h2>
            <p>Visualize real-time graphs of ECG, SpO2, and CO2 levels.</p>
        </a>
        <button onclick="launchSimulator()" class="menu-card">
            <h2>⚡ Defibrillator</h2>
            <p>Simulate defibrillation techniques and see their effects.</p>
    </button>
    </div>
    
    <!-- Username display and persistence -->
    <div style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px; font-size: 0.9em;">
        <span id="username-display">User: <strong id="current-username">Loading...</strong></span>
        <a href="/" style="margin-left: 15px; color: #e74c3c; text-decoration: none; cursor: pointer;" onclick="logout()">Logout</a>
    </div>
</body>
<script>
    // Get username from URL or sessionStorage
    const urlParams = new URLSearchParams(window.location.search);
    let username = urlParams.get('username');
    
    if (!username) {
        username = sessionStorage.getItem('username');
    }
    
    if (!username) {
        // No username found, redirect to login
        window.location.href = '/';
    }
    
    // Store and display username
    sessionStorage.setItem('username', username);
    document.getElementById('current-username').textContent = username;
    
    // Add username to all menu links
    document.querySelectorAll('a.menu-card').forEach(link => {
        const href = link.getAttribute('href');
        if (href && !href.includes('username=')) {
            link.href = `${href}?username=${encodeURIComponent(username)}`;
        }
    });
    
    function logout() {
        sessionStorage.removeItem('username');
        window.location.href = '/';
    }

    async function launchSimulator() {
        const data = {
            username: sessionStorage.getItem('username') || 'anonymous',
        }
        try {
            const response = await fetch('http://127.0.0.1:8000/api/prepare_session', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                window.location.href = "http://localhost:3000/simulator?username=" + encodeURIComponent(username);
            } else {
                alert('Failed to prepare session. Please try again.');
            }
        }  
        catch (error) {
            console.error('Error preparing session:', error);
        }
    }
</script>
</html>
