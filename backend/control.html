<!DOCTYPE html>
<html>
    <head>
        <title>Panneau de contrôle des constantes</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 30px; background: #2c3e50; color: white; }
            h1 { text-align: center; }
            .panel-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
            .control-box { background: #34495e; padding: 25px; border-radius: 12px; width: 300px;}
            label { display: block; margin-top: 15px; font-weight: bold; color: #bdc3c7;}
            input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; box-sizing: border-box; }
            button { margin-top: 20px; width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
            button:hover { background: #2980b9; }
            .rythm {padding: 10px;}
            dialog { color: white;background: #34495e;border: none; padding: 2rem; border-radius: 1rem; max-width: 380px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,.2);}

dialog::backdrop {
  backdrop-filter: blur(4px);
  background: rgba(0,0,0,.35);
}
        </style>
    </head>
    <body>
        <h1>Panneau de contrôle des constantes</h1>
        
        <div class="panel-container">
            <div class="control-box">
                <h2>Choix du scénario</h2>
                <button onclick="modal.showModal()">Sélectionner un scénario</button>
                <p>Scénario sélectionné : <output id="scenario_value"></output></p>

            <dialog id="modal">
                <h2>Sélectionner un scénario</h2>
                <button onclick="document.getElementById('scenario_value').textContent = 'Scénario 1'; sendScenario(); setScenario('Scénario 1'); modal.close()">⚡Scénario 1 - ACR défibrillation en mode manuel</button>
                <button onclick="document.getElementById('scenario_value').textContent = 'Scénario 2'; sendScenario(); setScenario('Scénario 2'); modal.close()">💓Scénario 2 - ACR défibrillation en mode DAE</button>
                <button onclick="document.getElementById('scenario_value').textContent = 'Scénario 3'; sendScenario(); setScenario('Scénario 3'); modal.close()">💔Scénario 3 - Entraînement électrosystolique</button>
                <button onclick="document.getElementById('scenario_value').textContent = 'Scénario 4'; sendScenario(); setScenario('Scénario 4'); modal.close()">💚Scénario 4 - Cardioversion</button>
                <button onclick="document.getElementById('scenario_value').textContent = 'Scénario 5'; sendScenario(); setScenario('Scénario 5'); modal.close()">🚑Scénario 5 - Simulation in situ</button>
                <button onclick="modal.close()">Fermer</button>
            </dialog>
            </div>
            <div class="control-box">
                <h2>Simulateur de Rythme Cardiaque</h2>
                <label for="rythm_select">Sélectionnez un rythme :</label>
                <select class="rythm" id="rythm_select">
                    <option value="sinusal" style = "background-image:url(backend/rythm_image/Sinus.png);">Sinusal</option>
                    <option value="tachy_a" style = "background-image:url(backend/rythm_image/tachya.png);">Tachy A.</option>
                    <option value="tsv" style = "background-image:url(backend/rythm_image/TSV.png);">TSV</option>
                    <option value="jonctionnel" style = "background-image:url(backend/rythm_image/Junctionnel.png);">Jonctionnel.</option>
                    <option value="fib_a" style = "background-image:url(backend/rythm_image/FibA.png);">Fibrillation A.</option>
                    <option value="flutt_a" style = "background-image:url(backend/rythm_image/FluttA.png);">Flutt A.</option>
                    <option value="1_bav" style = "background-image:url(backend/rythm_image/1BAV.png);">1° BAV</option>
                    <option value="2_bav_I" style = "background-image:url(backend/rythm_image/2BAV1.png);">2° BAV I</option>
                    <option value="2_bav_II" style = "background-image:url(backend/rythm_image/2BAV2.png);">2° BAV II</option>
                    <option value="3_bav" style = "background-image:url(backend/rythm_image/3BAV.png);">3° BAV</option>
                    <option value="idiov" style = "background-image:url(backend/rythm_image/idiov.png);">Idiov.</option>
                    <option value="tv_1" style = "background-image:url(backend/rythm_image/TV1.png);">TV de type 1</option>
                    <option value="tv_2" style = "background-image:url(backend/rythm_image/TV2.png);">TV de type 2</option>
                    <option value="tors" style = "background-image:url(backend/rythm_image/torsade.png);">Torsade</option>
                    <option value="rs_hvg" style = "background-image:url(backend/rythm_image/RSavHVG.png);">RS av. HVG</option>
                    <option value="rs_hd" style = "background-image:url(backend/rythm_image/RSavHD.png);">RS av. HD</option>
                    <option value="rs_hvd" style = "background-image:url(backend/rythm_image/RSavHD.png);">RS av. HVD</option>
                    <option value="fv" style = "background-image:url(backend/rythm_image/FV.png);">FV</option>
                    <option value="arret" style = "background-image:url(backend/rythm_image/Asys.png);">Arrêt</option>
                    <option value="asysto" style = "background-image:url(backend/rythm_image/Asys.png);">Asystolie</option>
                    <option value="stim" style = "background-image:url(backend/rythm_image/Stim.png);">Stimulateur</option>
                    <option value="seq" style = "background-image:url(backend/rythm_image/seqavsti.png);">Séq. A-V du stimulateur</option>
                    <option value="p_cap" style = "background-image:url(backend/rythm_image/Pcapsti.png);">P.capture stimulateur</option>
                </select>
                <button onclick="sendRythm()">Push Rythm Data</button>
            </div>
            <div class="control-box">
                <h2>Simulateur ECG</h2>
                <label>BPM (Rythme Cardiaque)</label>
                <input type="range" id="bpm_input" min="20" max="200">
                <p>Value: <output id="bpm_value"></output></p>
                
                <label>SpO2 (%)</label>
                <input type="range" id="spo2_input" min="0" max="100">
                <p>Value: <output id="spo2_value"></output></p>
                
                <button onclick="sendECG()">Push ECG Data</button>
            </div>

            <div class="control-box">
                <h2>Simulateur de Pression</h2>
                <label>Pression systolique (mmHg)</label>
                <input type="range" id="systolic_input" min="0" max="300">
                <p>Value: <output id="systolic_value"></output></p>
                <label>Pression diastolique (mmHg)</label>
                <input type="range" id="diastolic_input" min="0" max="200">
                <p>Value: <output id="diastolic_value"></output></p>

                <button onclick="sendPressure()">Push Pressure Data</button>
            </div>
            <div class="control-box">
                <h2>Fréquence Respiratoire</h2>
                <label>Fréquence (respirations/min)</label>
                <input type="range" id="resp_input" min="0" max="60">
                <p>Value: <output id="resp_value"></output></p>

                <button onclick="sendRespiration()">Push Respiration Data</button>
            </div>
        </div>

        <script>
            var slider = document.getElementById("bpm_input");
        var output = document.getElementById("bpm_value");
            output.innerHTML = slider.value; // Display the default slider value

        // Update the current slider value (each time you drag the slider handle)
        slider.oninput = function() {
            output.innerHTML = this.value;
        }
        var spo2_slider = document.getElementById("spo2_input");
        var spo2_output = document.getElementById("spo2_value");
        spo2_output.innerHTML = spo2_slider.value; // Display the default slider value

        // Update the current slider value (each time you drag the slider handle)
        spo2_slider.oninput = function() {
            spo2_output.innerHTML = this.value;
        }

        var systolic_slider = document.getElementById("systolic_input");
        var systolic_output = document.getElementById("systolic_value");
        systolic_output.innerHTML = systolic_slider.value; // Display the default slider value

        // Update the current slider value (each time you drag the slider handle)
        systolic_slider.oninput = function() {
            systolic_output.innerHTML = this.value;
        }

        var diastolic_slider = document.getElementById("diastolic_input");
        var diastolic_output = document.getElementById("diastolic_value");
        diastolic_output.innerHTML = diastolic_slider.value; // Display the default slider value

        // Update the current slider value (each time you drag the slider handle)
        diastolic_slider.oninput = function() {
            diastolic_output.innerHTML = this.value;
            // If diastolic is greater than systolic, update systolic to match diastolic
            if (parseInt(this.value) > parseInt(systolic_slider.value)) {
                systolic_slider.value = this.value;
                systolic_output.innerHTML = this.value;
            }
        }

        var resp_slider = document.getElementById("resp_input");
        var resp_output = document.getElementById("resp_value");
        resp_output.innerHTML = resp_slider.value; // Display the default slider value

        // Update the current slider value (each time you drag the slider handle)
        resp_slider.oninput = function() {
            resp_output.innerHTML = this.value;
        }

        // 1. Open background WebSockets directly to the sensor channels
        const ecg_ws = new WebSocket("ws://127.0.0.1:8000/ws/sensor/ecg_sensor");
        const pressure_ws = new WebSocket("ws://127.0.0.1:8000/ws/sensor/pressure_sensor");
        const resp_ws = new WebSocket("ws://127.0.0.1:8000/ws/sensor/respiratory_sensor");
        const rythm_ws = new WebSocket("ws://127.0.0.1:8000/ws/sensor/rhythm_sensor");
        const scenario_ws = new WebSocket("ws://127.0.0.1:8000/ws/scenario");

            // 2. Function to grab ECG inputs and send them
            function sendECG() {
                const bpm = document.getElementById("bpm_input").value;
                const spo2 = document.getElementById("spo2_input").value;
                
                if (bpm && spo2) {
                    const message = "BPM : " + bpm + ", SpO2: " + spo2 + "%";
                    ecg_ws.send(message);
                } else {
                    alert("Please enter both BPM and SpO2 values.");
                }
            }

            // 3. Function to grab Pressure input and send it
            function sendPressure() {
                const systolic = document.getElementById("systolic_input").value;
                const diastolic = document.getElementById("diastolic_input").value;

                if (systolic && diastolic) {
                    const message = systolic+" / "+diastolic + " mmHg";
                    pressure_ws.send(message);
                } else {
                    alert("Please enter both Systolic and Diastolic values.");
                }
            }

            // 4. Function to grab Respiration input and send it
            function sendRespiration() {
                const resp = document.getElementById("resp_input").value;

                if (resp) {
                    const message = "Respiration: " + resp + " breaths/min";
                    resp_ws.send(message);
                } else {
                    alert("Please enter a Respiration value.");
                }
            }
            // 5. Function to grab selected scenario and send it
            function sendScenario() {
                const scenario = document.getElementById("scenario_value").textContent;            
                
                if (scenario) {
                    scenario_ws.send(scenario);
                }
            }

            function sendRythm() {
                const rythm = document.getElementById("rythm_select").value;
                // You can define specific messages for each rhythm if needed
                const message = rythm;
                rythm_ws.send(message);
            }
            function setScenario(scenario) {
                if (scenario === "Scénario 1") {                 //Selector for scenario 1
                    const bpm = 190;
                    const spo2 = "Unknown";
                
                    if (bpm) {
                        const message = "BPM : " + bpm + ", SpO2: " + spo2 + "%";
                        ecg_ws.send(message);
                }
                    const rythm = "Fibrillation Ventriculaire";

                    const message = rythm;
                    rythm_ws.send(message);
                } else if (scenario === "Scénario 2") {          //Selector for scenario 2
                    const bpm = 190;
                    const spo2 = "Unknown";
                
                    if (bpm && spo2) {
                        const message = "BPM : " + bpm + ", SpO2: " + spo2 + "%";
                        ecg_ws.send(message);
                }
                    const rythm = "Fibrillation Ventriculaire";
                    const message = rythm;
                    rythm_ws.send(message);
                } else if (scenario === "Scénario 3") {          //Selector for scenario 3
                    const bpm = 30;
                    const spo2 = "92";
                    if (bpm && spo2) {
                        const message = "BPM : " + bpm + ", SpO2: " + spo2 + "%";
                        ecg_ws.send(message);
                }
                    const rythm = "3° BAV";
                    const message = rythm;
                    rythm_ws.send(message);
                    const systolic = 110;
                    const diastolic = 80;

                    if (systolic && diastolic) {
                        const message = systolic+" / "+diastolic + " mmHg";
                        pressure_ws.send(message);
                }
                } else if (scenario === "Scénario 4") {          //Selector for scenario 4
                    const bpm = 160;
                    const spo2 = "95";
                    if (bpm && spo2) {
                        const message = "BPM : " + bpm + ", SpO2: " + spo2 + "%";
                        ecg_ws.send(message);
                }
                    const rythm = "Fibrillation Auriculaire";
                    
                    const message = rythm;
                    rythm_ws.send(message);
                } else if (scenario === "Scénario 5") {           //Selector for scenario 5
                    const bpm = 170;
                    const spo2 = "Unknown";
                
                    if (bpm) {
                        const message = "BPM : " + bpm + ", SpO2: " + spo2 + "%";
                        ecg_ws.send(message);
                }
                    const rythm = "Fibrillation Ventriculaire";
                    const message = rythm;
                    rythm_ws.send(message);
            } 
            }
        </script>
    </body>
</html>
