<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scope</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body {
            background-color: #000000;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            box-sizing: border-box;
            padding: 6px;
        }
        .heartrate {
            color: rgb(68, 255, 47);
        }
        .graph_value {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }
        .graph_bounds {
            flex: 0 0 auto;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.8;
        }
        .spo2 {
            color: rgb(255, 255, 0);
        }
        .co2 {
            color: rgb(255, 255, 255);
        }
        .constant {
            display: flex;
            margin: 3px 0;
            width: 100%;
        }
        .heartrate, .spo2, .co2 {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 5px;
        }
        .graph {
            flex: 0 0 90%;
        }

        .pressure {
            color: rgb(255, 0, 0);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .pouls {
            color: rgb(255, 255, 0);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            gap: 0;
        }
        .frequency {
            color: rgb(255, 255, 255);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .bounds {
            opacity: 0.8;
            font-size: 22px;
        }
        .value-row {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }
        .value {
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="constant" onclick="check()">
        <div class="heartrate">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">120<br/>50</h2>
            <h2 class="graph_value">80</h2>
        </div>
    </div>
    <div class="constant">
        <div class="spo2">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">100<br/>90</h2>
            <h2 class="graph_value">98%</h2>
        </div>
    </div>

    <div class="constant">
        <div class="co2">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">40<br/>0</h2>
            <h2 class="graph_value">40</h2>
        </div>
    </div>
    <div class="constant">
        <div class="pressure">
            <h2 style="margin: 0;">TA</h2>
            <div class="value-row">
                <h2 class="bounds" style="color: rgb(255, 0, 0); margin: 0;">160<br/>90</h2>
                <h2 class = "value" style="margin: 0;">120/80</h2>
            </div>
        </div>
        <div style="flex: 1;"></div>
        <div class="pouls">
            <h2 style="margin: 0;">Pouls</h2>
            <div class="value-row">
                <h2 class="bounds" style="margin: 0;">50<br/>40</h2>
                <h2 class = "value" style="margin: 0;">30</h2>
            </div>
        </div>
        <div class="frequency">
            <h2 style="margin: 0;">FRVA</h2>
            <div class="value-row">
                <h2 class="bounds" style="margin: 0;">50<br/>12</h2>
                <h2 class = "value" style="margin: 0;">30</h2>
            </div>
        </div>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Store original values for each graph_value
        const graphValues = document.querySelectorAll('.graph_value, .value');
        graphValues.forEach(element => {
            element.dataset.originalValue = element.textContent;
            element.dataset.hidden = 'false';
            element.addEventListener('click', function(e) {
                e.stopPropagation();
                if (this.dataset.hidden === 'false') {
                    this.textContent = '--';
                    this.dataset.hidden = 'true';
                } else {
                    this.textContent = this.dataset.originalValue;
                    this.dataset.hidden = 'false';
                }
            });
        });
    });
    
    function check() {
        console.log("Clicked on heart rate graph!");
    }
</script>
</html>
