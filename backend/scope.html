<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scope</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body {
            background-color: #000000;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            box-sizing: border-box;
            padding: 6px;
        }
        .heartrate {
            color: rgb(68, 255, 47);
        }
        .graph_value {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }
        .graph_bounds {
            flex: 0 0 auto;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.8;
        }
        .spo2 {
            color: rgb(255, 255, 0);
        }
        .co2 {
            color: rgb(255, 255, 255);
        }
        .constant {
            display: flex;
            margin: 3px 0;
            width: 100%;
        }
        .heartrate, .spo2, .co2 {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 5px;
        }
        .graph {
            flex: 0 0 90%;
        }

        .pressure {
            color: rgb(255, 0, 0);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .pouls {
            color: rgb(255, 255, 0);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            gap: 0;
        }
        .frequency {
            color: rgb(255, 255, 255);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .bounds {
            opacity: 0.8;
            font-size: 22px;
        }
        .value-row {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }
        .value { 
            cursor: pointer; 
        }

      /*  #ecg-container {
            flex: 0 0 90%;
            min-height: 0; 
        } */

    </style>
</head>
<body>
    <div class="alerts" style="position: right; top: 20 px; right : 20 px; background: rgb(0, 0, 0); padding: 10px 150px; border-radius: 8px; color: white; font-size: 0.9em;">
        <span id = 'big_alerts' style = 'background-color: red; color: #000000; position: left;' ></span>
        
    </div>
    <div style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; color: white; font-size: 0.9em; z-index: 1000;">
        <span>Patient: <strong id="current-username">Loading...</strong></span>
        <a href="/" style="margin-left: 15px; color: #4af;" onclick="logout()">Logout</a>
    </div>
    <div class="constant" id="heartrate-row" onclick="check()">
        <div class="heartrate">
            <div class="graph" id="ecg-container">
            </div>
            <h2 class="graph_bounds">130<br/>50</h2>
            <h2 class="graph_value" id="heartrate_value">70</h2>
        </div>
    </div>
    <div class="constant">
        <div class="spo2">
            <div class="graph" id = "pleth-container">
            </div>
            <h2 class="graph_bounds">100<br/>90</h2>
            <h2 class="graph_value" id="spo2_value">98%</h2>
        </div>
    </div>

    <div class="constant">
        <div class="co2">
            <div class="graph" id="co2-container" style="width: 100%; min-width: 500px; min-height: 80px; display: block;">
            </div>
            <h2 class="graph_bounds">65<br/>25</h2>
            <h2 class="graph_value" id="co2_value">40</h2>
        </div>
    </div>
    <div class="constant">
        <div class="pressure">
            <h2 style="margin: 0;">TA</h2>
            <div class="value-row">
                <h2 class="bounds" style="color: rgb(255, 0, 0); margin: 0;">160<br/>90</h2>
                <h2 class="value" id="pressure_value" style="margin: 0;">120/80</h2>
            </div>
        </div>
        <div style="flex: 1;"></div>
        <div class="pouls">
            <h2 style="margin: 0;">Pouls</h2>
            <div class="value-row">
                <h2 class="bounds" style="margin: 0;">50<br/>40</h2>
                <h2 class="value" id="pouls_value" style="margin: 0;">70</h2>
            </div>
        </div>
        <div class="frequency">
            <h2 style="margin: 0;">FRVA</h2>
            <div class="value-row">
                <h2 class="bounds" style="margin: 0;">30<br/>8</h2>
                <h2 class="value" id="resp_value" style="margin: 0;">30</h2>
            </div>
        </div>
    </div>
    <script src="static/scopeUser.js"></script>
    <script type="text/babel" src="static/scopeReact.js"></script>  
</body>
</html>
