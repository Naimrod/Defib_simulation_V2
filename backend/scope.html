<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scope</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body {
            background-color: #000000;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            box-sizing: border-box;
            padding: 6px;
        }
        .heartrate {
            color: rgb(68, 255, 47);
        }
        .graph_value {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }
        .graph_bounds {
            flex: 0 0 auto;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.8;
        }
        .spo2 {
            color: rgb(255, 255, 0);
        }
        .co2 {
            color: rgb(255, 255, 255);
        }
        .constant {
            display: flex;
            margin: 3px 0;
            width: 100%;
        }
        .heartrate, .spo2, .co2 {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 5px;
        }
        .graph {
            flex: 0 0 90%;
        }

        .pressure {
            color: rgb(255, 0, 0);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .pouls {
            color: rgb(255, 255, 0);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            gap: 0;
        }
        .frequency {
            color: rgb(255, 255, 255);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .bounds {
            opacity: 0.8;
            font-size: 22px;
        }
        .value-row {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }
        .value { 
            cursor: pointer; 
        }

      /*  #ecg-container {
            flex: 0 0 90%;
            min-height: 0; 
        } */

    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; color: white; font-size: 0.9em; z-index: 1000;">
        <span>Patient: <strong id="current-username">Loading...</strong></span>
        <a href="/" style="margin-left: 15px; color: #4af;" onclick="logout()">Logout</a>
    </div>
    <div class="constant" id="heartrate-row" onclick="check()">
        <div class="heartrate">
            <div class="graph" id="ecg-container">
            </div>
            <h2 class="graph_bounds">120<br/>50</h2>
            <h2 class="graph_value" id="heartrate_value">80</h2>
        </div>
    </div>
    <div class="constant">
        <div class="spo2">
            <div class="graph" id = "pleth-container">
            </div>

        </div>
    </div>

    <div class="constant">
        <div class="co2">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">40<br/>0</h2>
            <h2 class="graph_value" id="co2_value">40</h2>
        </div>
    </div>
    <div class="constant">
        <div class="pressure">
            <h2 style="margin: 0;">TA</h2>
            <div class="value-row">
                <h2 class="bounds" style="color: rgb(255, 0, 0); margin: 0;">160<br/>90</h2>
                <h2 class="value" id="pressure_value" style="margin: 0;">120/80</h2>
            </div>

        <div style="flex: 1;"></div>
        <div class="pouls">
            <h2 style="margin: 0;">Pouls</h2>
            <div class="value-row">
                <h2 class="bounds" style="margin: 0;">50<br/>40</h2>
                <h2 class="value" id="pouls_value" style="margin: 0;">30</h2>
            </div>
        </div>
        <div class="frequency">
            <h2 style="margin: 0;">FRVA</h2>
            <div class="value-row">
                <h2 class="bounds" style="margin: 0;">50<br/>12</h2>

            </div>
        </div>

</body>
<script>

////////////////////////////////////////////////////////
// ----- WEBSOCKET AND USER MANAGEMENT CODE BELOW -----
////////////////////////////////////////////////////////
    // Get username from URL or sessionStorage
    const urlParams = new URLSearchParams(window.location.search);
    let username = urlParams.get('username');
    
    if (!username) {
        username = sessionStorage.getItem('username');
    }
    
    if (!username) {
        username = 'anonymous';
    }
    
    // Store and display username
    sessionStorage.setItem('username', username);
    document.getElementById('current-username').textContent = username;
    
    function logout() {
        sessionStorage.removeItem('username');
        window.location.href = '/';
    }
    
    // WebSocket connection to receive data from backend via device_channel
    const device_channel = new WebSocket(`ws://127.0.0.1:8000/device_channel?username=${encodeURIComponent(username)}`);
    
    // Store for parsed vital signs
    const vitals = {
        bpm: 80,
        spo2: 98,
        co2: 40,
        systolic: 120,
        diastolic: 80,
        resp: 30
    };
    
    device_channel.onopen = function() {
        console.log("Scope connected to device_channel");
    };
    
    device_channel.onmessage = function(event) {
        let data;
        try {
            data = JSON.parse(event.data);
        } catch (e) {
            console.error("Failed to parse message:", event.data);
            return;
        }
        
        console.log("Received data:", data);
        
        // Handle ECG data (BPM and SpO2)
        if (data.type === "ecg" || (data.dataType === "sensor" && (data.bpm !== undefined || data.spo2 !== undefined))) {
            if (data.bpm !== undefined && data.bpm !== null) {
                vitals.bpm = data.bpm;
                updateDisplay('heartrate_value', vitals.bpm);
            }
            if (data.spo2 !== undefined && data.spo2 !== null) {
                vitals.spo2 = data.spo2;
                updateDisplay('spo2_value', vitals.spo2 + '%');
            }
        }
        
        // Handle CO2 data
        if (data.type === "co2" || (data.dataType === "sensor" && data.co2 !== undefined)) {
            if (data.co2 !== undefined && data.co2 !== null) {
                vitals.co2 = data.co2;
                updateDisplay('co2_value', vitals.co2);
            }
        }

        // Handle Pressure data
        if (data.type === "pressure" || (data.dataType === "sensor" && (data.systolic !== undefined || data.diastolic !== undefined))) {
            if (data.systolic !== undefined && data.systolic !== null) {
                vitals.systolic = data.systolic;
            }
            if (data.diastolic !== undefined && data.diastolic !== null) {
                vitals.diastolic = data.diastolic;
            }
            updateDisplay('pressure_value', vitals.systolic + '/' + vitals.diastolic);
        }
        
        // Handle Respiration data
        if (data.type === "respiration" || (data.dataType === "sensor" && data.respirationRate !== undefined)) {
            if (data.respirationRate !== undefined && data.respirationRate !== null) {
                vitals.resp = data.respirationRate;
                updateDisplay('resp_value', vitals.resp);
            }
        }
        
        // Handle Rhythm data (if applicable)
        if (data.type === "rhythm" || (data.dataType === "sensor" && data.rhythm)) {
            console.log("Rhythm update:", data.rhythmLabel || data.rhythm);
        }
    };
    
    device_channel.onerror = function(error) {
        console.error("WebSocket error:", error);
    };
    
    device_channel.onclose = function() {
        console.log("Disconnected from device_channel");
    };
    
    function updateDisplay(elementId, value) {
        const element = document.getElementById(elementId);
        if (element && element.dataset.hidden === 'false') {
            element.textContent = value;
            // Update stored original value for toggle functionality
            element.dataset.originalValue = value;
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        // Store original values for each graph_value and value
        const graphValues = document.querySelectorAll('.graph_value, .value');
        graphValues.forEach(element => {
            element.dataset.originalValue = element.textContent;
            element.dataset.hidden = 'false';
            element.addEventListener('click', function(e) {
                e.stopPropagation();
                if (this.dataset.hidden === 'false') {
                    this.textContent = '--';
                    this.dataset.hidden = 'true';
                } else {
                    this.textContent = this.dataset.originalValue;
                    this.dataset.hidden = 'false';
                }
            });
        });
    });
    
    function check() {
        console.log("Clicked on heart rate graph!");
    }
</script>
<script type="text/babel">
////////////////////////////////////////////////////////
// ----- REACT THINGY -----
////////////////////////////////////////////////////////
const { useRef, useEffect, useState } = React;
    // ──────────────────────────────────────────────────────────────────────
    // SYNTHETIC ECG DATA GENERATORS  (replaces vitalSignsData.json import)
    // ──────────────────────────────────────────────────────────────────────

    function gaussianPeak(t, center, width, height) {
        return height * Math.exp(-Math.pow(t - center, 2) / (2 * width * width));
    }

    /** Single sinus beat at 250 Hz, ~200 samples */
    function makeSinusBeat(scale = 1.0) {
        const N = 200;
        const beat = new Array(N).fill(0);
        for (let i = 0; i < N; i++) {
            const t = i / N;
            beat[i] =
                gaussianPeak(t, 0.10, 0.012, 0.08 * scale) +   // P wave
                gaussianPeak(t, 0.19, 0.006, -0.05 * scale) +  // Q
                gaussianPeak(t, 0.22, 0.009, 1.0 * scale) +    // R
                gaussianPeak(t, 0.25, 0.006, -0.15 * scale) +  // S
                gaussianPeak(t, 0.38, 0.030, 0.18 * scale);    // T wave
        }
        return beat;
    }
    /** BAV1 beat: PR interval prolonged */
    function makeBav1Beat() {
        const N = 220;
        const beat = new Array(N).fill(0);
        for (let i = 0; i < N; i++) {
            const t = i / N;
            beat[i] =
                gaussianPeak(t, 0.08, 0.013, 0.08) +
                gaussianPeak(t, 0.22, 0.006, -0.05) +
                gaussianPeak(t, 0.25, 0.009, 1.0) +
                gaussianPeak(t, 0.28, 0.006, -0.15) +
                gaussianPeak(t, 0.40, 0.030, 0.18);
        }
         return beat;
    }

    /** BAV3: slow ventricular escape beat, no P-R relation */
    function makeBav3Beat() {
        const N = 300;
        const beat = new Array(N).fill(0);
        for (let i = 0; i < N; i++) {
            const t = i / N;
            beat[i] =
                gaussianPeak(t, 0.25, 0.025, -0.08) +  // wide Q
                gaussianPeak(t, 0.33, 0.022, 0.70) +    // wide R
                gaussianPeak(t, 0.44, 0.025, -0.20) +   // wide S
                gaussianPeak(t, 0.58, 0.045, 0.25);     // wide T
        }
        return beat;
    }

    /** Pacing spike + captured beat */
    function makePacingBeat() {
        const N = 210;
        const beat = new Array(N).fill(0);
        beat[10] = 0.9;  // spike
        beat[11] = -0.2;
        for (let i = 0; i < N; i++) {
            const t = i / N;
            beat[i] +=
                gaussianPeak(t, 0.25, 0.020, -0.06) +
                gaussianPeak(t, 0.33, 0.018, 0.75) +
                gaussianPeak(t, 0.43, 0.020, -0.18) +
                gaussianPeak(t, 0.55, 0.040, 0.22);
        }
        return beat;
    }

    /** VF: chaotic waveform */
    function generateVF(nSamples) {
        const buf = [];
        let phase = 0;
        for (let i = 0; i < nSamples; i++) {
            phase += (2 * Math.PI * (6 + Math.random() * 4)) / 250;
            buf.push(
                0.5 * Math.sin(phase) +
                0.3 * Math.sin(phase * 1.7 + Math.random()) +
                0.15 * (Math.random() - 0.5)
            );
        }
        return buf;
    }

    /** VT: monomorphic wide-complex tachycardia */
    function generateVT(nSamples) {
        const beat = new Array(60).fill(0);
        for (let i = 0; i < 60; i++) {
            const t = i / 60;
            beat[i] =
                gaussianPeak(t, 0.25, 0.06, -0.1) +
                gaussianPeak(t, 0.40, 0.05, 0.8) +
                gaussianPeak(t, 0.60, 0.06, -0.15) +
                gaussianPeak(t, 0.75, 0.05, 0.22);
        }
        const buf = [];
        while (buf.length < nSamples) buf.push(...beat);
        return buf.slice(0, nSamples);
    }

    /** AF: irregular rhythm, no clear P waves, irregular R-R */
    function generateAF(heartRate, nSamples, sr) {
        const buf = new Array(nSamples).fill(0);
        // fine flutter baseline
        for (let i = 0; i < nSamples; i++) {
            buf[i] = 0.04 * Math.sin((2 * Math.PI * 7 * i) / sr) * (0.8 + 0.2 * Math.random());
        }
        const meanRR = (60 / heartRate) * sr;
        let idx = Math.floor(meanRR * 0.2);
        while (idx < nSamples - 60) {
            const rr = meanRR * (0.75 + Math.random() * 0.5);
            const beat = makeSinusBeat(0.9);
            for (let j = 0; j < beat.length && idx + j < nSamples; j++) buf[idx + j] += beat[j];
            idx += Math.round(rr);
        }
        return buf;
    }

    /** Asystole: near-flat line */
    function generateAsystole(nSamples) {
        return Array.from({ length: nSamples }, () => (Math.random() - 0.5) * 0.015);
    }

    // ── helpers shared with ECGRhythms logic ──────────────────────────────

    function generateRampedNoise(length, amplitude, startValue, endValue) {
        const out = [];
        if (length <= 0) return out;
        if (length === 1) { out.push(startValue + (Math.random() - 0.5) * amplitude); return out; }
        for (let i = 0; i < length; i++) {
            const ramp = i / (length - 1);
            out.push(startValue + (endValue - startValue) * ramp + (Math.random() - 0.5) * amplitude);
        }
        return out;
    }

    function createSeamlessLoop(buffer, blendDurationMs, sr) {
        const blendSamples = Math.floor((blendDurationMs / 1000) * sr);
        if (buffer.length <= blendSamples) return buffer;
        const gap = buffer[0] - buffer[buffer.length - 1];
        for (let i = 0; i < blendSamples; i++) {
            const ramp = i / (blendSamples - 1);
            buffer[buffer.length - blendSamples + i] += gap * ramp;
        }
        return buffer;
    }

    function generateDynamicECG(heartRate, durationSec, sr, rhythmType) {
        const totalSamples = durationSec * sr;
        const buffer = new Array(totalSamples).fill(0);
        let MOTIFS;
        switch (rhythmType) {
            case 'sinus':          MOTIFS = [makeSinusBeat(1.0), makeSinusBeat(0.95)]; break;
            case 'bav1':           MOTIFS = [makeBav1Beat()]; break;
            case 'bav3':           MOTIFS = [makeBav3Beat()]; break;
            case 'electroEntrainement': MOTIFS = [makePacingBeat()]; break;
            default:               MOTIFS = [makeSinusBeat(1.0)]; break;
        }
        let lastEnd = MOTIFS[0][MOTIFS[0].length - 1];
        let currentIndex = 0;
        while (currentIndex < totalSamples) {
            const rrSamples = Math.round((60 / heartRate) * (1 + (Math.random() - 0.5) * 0.1) * sr);
            const motif = MOTIFS[Math.floor(Math.random() * MOTIFS.length)];
            const paddingLen = Math.max(0, rrSamples - motif.length);
            if (paddingLen > 0) {
                const pad = generateRampedNoise(paddingLen, 0.03, lastEnd, motif[0]);
                for (let i = 0; i < paddingLen && currentIndex + i < totalSamples; i++)
                    buffer[currentIndex + i] = pad[i];
            }
            const start = currentIndex + paddingLen;
            for (let i = 0; i < motif.length && start + i < totalSamples; i++)
                buffer[start + i] = motif[i];
            lastEnd = motif[motif.length - 1];
            currentIndex += rrSamples;
        }
        return buffer;
    }
    function getRhythmData(rhythmType, heartRate) {
        const dur = 10, sr = 250;
        const n = dur * sr;
        switch (rhythmType) {
            case 'sinus':
                return createSeamlessLoop(generateDynamicECG(heartRate, dur, sr, 'sinus'), 100, sr);
            case 'tachycardieVentriculaire':
                return createSeamlessLoop(generateVT(n), 200, sr);
            case 'fibrillationVentriculaire':
                return createSeamlessLoop(generateVF(n), 200, sr);
            case 'asystole':
                return createSeamlessLoop(generateAsystole(n), 200, sr);
            case 'fibrillationAtriale':
                return createSeamlessLoop(generateAF(heartRate, n, sr), 200, sr);
            case 'bav1':
                return createSeamlessLoop(generateDynamicECG(heartRate, dur, sr, 'bav1'), 200, sr);
            case 'bav3':
                return createSeamlessLoop(generateDynamicECG(heartRate, dur, sr, 'bav3'), 200, sr);
            case 'electroEntrainement':
                return createSeamlessLoop(generateDynamicECG(heartRate, dur, sr, 'electroEntrainement'), 100, sr);
            default:
                return createSeamlessLoop(generateDynamicECG(heartRate, dur, sr, 'sinus'), 100, sr);
        }
    }

    // ──────────────────────────────────────────────────────────────────────
    // ECGDisplay  (ported from ECGDisplay.tsx)
    // ──────────────────────────────────────────────────────────────────────

    function ECGDisplay({
        width = 800,
        height = 65,
        rhythmType = "sinus",
        showSynchroArrows = false,
        heartRate = 70,
        durationSeconds = 7,
        isDottedAsystole = false,
        isPacing = false,
        pacerFrequency = 70,
        pacerIntensity = 30,
    }) {
        const canvasRef = useRef(null);
        const animationRef = useRef(0);

        const dataRef = useRef([]);
        const peakCandidateIndicesRef = useRef(new Set());
        const pacingSpikeIndicesRef = useRef(new Set());
        const normalizationRef = useRef({ min: 0, max: 1 });
        const scanAccumulatorRef = useRef(0);
        const lastFrameTimeRef = useRef(0);
        const lastYRef = useRef(null);

        const propsRef = useRef({ showSynchroArrows, durationSeconds, rhythmType, heartRate, isDottedAsystole, isPacing, pacerFrequency, pacerIntensity });
        useEffect(() => {
            propsRef.current = { showSynchroArrows, durationSeconds, rhythmType, heartRate, isDottedAsystole, isPacing, pacerFrequency, pacerIntensity };
        });

         // Effect for Data Loading and Peak/Spike Pre-computation.
        useEffect(() => {
        const { rhythmType, heartRate, isPacing, pacerFrequency, pacerIntensity } = propsRef.current;

        const SAMPLING_RATE = 250;
        const CAPTURE_THRESHOLD = 90;

        let newBuffer;
        const newPeakCandidates = new Set();
        const newPacingSpikes = new Set();

        if (isPacing) {
            if (pacerIntensity >= CAPTURE_THRESHOLD) {
                newBuffer = getRhythmData('electroEntrainement', pacerFrequency);
        for (let i = 1; i < newBuffer.length; i++) {
          if (newBuffer[i] - newBuffer[i - 1] >= 0.4) {
            newPacingSpikes.add(i);
          }
        }
      } else {
        newBuffer = getRhythmData('bav3', heartRate);

        const spikeIntervalSamples = (60 / pacerFrequency) * SAMPLING_RATE;
        const totalSamples = newBuffer.length;
        const numSpikes = Math.floor(totalSamples / spikeIntervalSamples);

        for (let n = 1; n <= numSpikes; n++) {
          const spikeIndex = Math.floor(n * spikeIntervalSamples);
          if (spikeIndex < totalSamples) {
            newPacingSpikes.add(spikeIndex);
          }
        }
      }
    } else {
      newBuffer = getRhythmData(rhythmType, heartRate);

      const excludedRhythms = ['fibrillationVentriculaire', 'asystole'];
      if (!excludedRhythms.includes(rhythmType)) {
        const refractoryPeriodSamples = 38;
        const derivativeThreshold = 0.1;

        for (let i = 1; i < newBuffer.length; i++) {
          const diff = newBuffer[i] - newBuffer[i - 1];
          if (Math.abs(diff) > derivativeThreshold) {
            let peakIndex = i;
            let peakValue = newBuffer[i];
            const searchWindow = 15;
            for (let j = 1; j < searchWindow && (i + j) < newBuffer.length; j++) {
              if (newBuffer[i + j] > peakValue) {
                peakValue = newBuffer[i + j];
                peakIndex = i + j;
              }
            }
            newPeakCandidates.add(peakIndex);
            i = peakIndex + refractoryPeriodSamples;
          }
        }
      }
    }

    dataRef.current = newBuffer;
    peakCandidateIndicesRef.current = newPeakCandidates;
    pacingSpikeIndicesRef.current = newPacingSpikes;
    normalizationRef.current = {
      min: Math.min(...newBuffer),
      max: Math.max(...newBuffer),
    };


  }, [rhythmType, heartRate, isPacing, pacerFrequency, pacerIntensity]);


        // Effect for Animation and Drawing.
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;

    scanAccumulatorRef.current = 0;
    lastFrameTimeRef.current = 0;
    lastYRef.current = null;

    const getNormalizedY = (value) => {
      const { min, max } = normalizationRef.current;
      const range = max - min;
      const topMargin = height * 0.3;
      const bottomMargin = height * 0.1;
      const traceHeight = height - topMargin - bottomMargin;
      const normalizedValue = range === 0 ? 0.5 : (value - min) / range;
      const canvasCenter = topMargin + traceHeight / 2;
      const { rhythmType, isPacing } = propsRef.current;
      if (rhythmType === 'electroEntrainement' || rhythmType === 'choc' || isPacing) {
        const gain = 40;
        return (canvasCenter - (value * gain)) / 0.6;
      } else {
        return topMargin + (1 - normalizedValue) * traceHeight;
      }
    };

            const drawGridColumn = (x) => {
      const pixelsPerSecond = width / propsRef.current.durationSeconds;
      ctx.strokeStyle = "#002200";
      ctx.lineWidth = 0.5;
      const timeStep = pixelsPerSecond / 5;
      if (x > 0 && Math.round(x) % Math.round(timeStep) === 0) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 0; y < height; y += 10) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + 1, y);
        ctx.stroke();
      }
    };

            const drawArrow = (x) => {
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, 10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, 15);
      ctx.lineTo(x - 4, 10);
      ctx.lineTo(x + 4, 10);
      ctx.closePath();
      ctx.fill();
    };

            const drawPacingSpike = (x) => {
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            };

            // Initial fill
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);
            for (let x = 0; x < width; x++) {
                drawGridColumn(x);
            }
            const drawFrame = (currentTime) => {

        return (
            <div ref={containerRef} style={{ width: '100%' }}>
                <ECGDisplay
                width={canvasWidth}
                height={65}
                rhythmType={rhythmType}
                heartRate={heartRate}
                durationSeconds={7}
            />
        </div>
        );
    };


    function PlethWrapper({ spo2 }) {
        const containerRef = useRef(null);
        const [canvasWidth, setCanvasWidth] = useState(800);

        const scanXRef       = useRef(0);
        const sampleIndexRef = useRef(0);
        const lastYRef       = useRef(null);

        const animationState = {
            getScanX:       () => scanXRef.current,
            setScanX:       (v) => { scanXRef.current = v; },
            getSampleIndex: () => sampleIndexRef.current,
            setSampleIndex: (v) => { sampleIndexRef.current = v; },
            getLastY:       () => lastYRef.current,
            setLastY:       (v) => { lastYRef.current = v; },
        };

        useEffect(() => {
                if (!containerRef.current) return;
                const ro = new ResizeObserver(entries => {
                for (const e of entries) setCanvasWidth(Math.floor(e.contentRect.width));
            });
            ro.observe(containerRef.current);
            setCanvasWidth(containerRef.current.offsetWidth);
            return () => ro.disconnect();
        }, []);

        const isFlatLine = spo2 !== null && spo2 < 70;
        const isDotted   = spo2 === null;

        return (
            <div ref={containerRef} style={{ width: '100%' }}>
                <PlethDisplay
                    width={canvasWidth}
                    height={65}
                    isDotted={isDotted}
                    isFlatLine={isFlatLine}
                    durationSeconds={7}
                    animationState={animationState}
                />
            </div>
        );
    }

    // ──────────────────────────────────────────────────────────────────────
    // Root – listens to WebSocket vitals and drives ECG props
    // ──────────────────────────────────────────────────────────────────────

    // Mapping des clés de control.html → clés de getRhythmData
    const RHYTHM_MAP = {
        // Sinusaux & supraventriculaires → sinus
        'sinusal':    'sinus',
        'tachy_a':    'sinus',
        'tsv':        'sinus',
        'jonctionnel':'sinus',
        'flutt_a':    'sinus',
        'rs_hvg':     'sinus',
        'rs_hd':      'sinus',
        'rs_hvd':     'sinus',
        // Fibrillation atriale
        'fib_a':      'fibrillationAtriale',
        // BAV
        '1_bav':      'bav1',
        '2_bav_I':    'bav1',
        '2_bav_II':   'bav1',
        '3_bav':      'bav3',
        // Ventriculaires
        'fv':         'fibrillationVentriculaire',
        'FV':         'fibrillationVentriculaire',
        'tv_1':       'tachycardieVentriculaire',
        'tv_2':       'tachycardieVentriculaire',
        'tors':       'tachycardieVentriculaire',
        'idiov':      'tachycardieVentriculaire',
        // Stimulateurs
        'stim':       'electroEntrainement',
        'seq':        'electroEntrainement',
        'p_cap':      'electroEntrainement',
        // Arrêt cardiaque
        'arret':      'asystole',
        'asysto':     'asystole',
    };
    function mapRhythm(raw) {
        return RHYTHM_MAP[raw] ?? 'sinus';
    }

    function App() {
        const [heartRate,  setHeartRate]  = useState(80);
        const [rhythmType, setRhythmType] = useState('sinus');

        useEffect(() => {
            // subscribe to the same device_channel as the rest of scope.html
            const ws = new WebSocket(`ws://127.0.0.1:8000/device_channel?username=${encodeURIComponent(username)}`);
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.bpm    != null) setHeartRate(data.bpm);
                    if (data.rhythm != null) setRhythmType(mapRhythm(data.rhythm));
                } catch (e) { /* ignore */ }
            };
            return () => ws.close();
        }, []);

        return <ECGWrapper heartRate={heartRate} rhythmType={rhythmType} />;
    }

    function App2() {
        const [spo2, setSpo2] = useState(98);

        useEffect(() => {
            const ws = new WebSocket(`ws://127.0.0.1:8000/device_channel?username=${encodeURIComponent(username)}`);
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.spo2 != null) setSpo2(data.spo2);
                } catch (e) { /* ignore */ }
            };
            return () => ws.close();
        }, []);

        return <PlethWrapper spo2={spo2} />;
    }

    ReactDOM.createRoot(document.getElementById('ecg-container')).render(<App />);
    ReactDOM.createRoot(document.getElementById('pleth-container')).render(<App2 />);
    </script>
</script>
</html>
