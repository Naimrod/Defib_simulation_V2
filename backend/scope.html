<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scope</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body {
            background-color: #000000;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            box-sizing: border-box;
            padding: 6px;
        }
        .heartrate {
            color: rgb(68, 255, 47);
        }
        .graph_value {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .graph_bounds {
            flex: 0 0 auto;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.8;
        }
        .spo2 {
            color: rgb(255, 255, 0);
        }
        .co2 {
            color: rgb(255, 255, 255);
        }
        .constant {
            display: flex;
            margin: 3px 0;
            width: 100%;
        }
        .heartrate, .spo2, .co2 {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 5px;
        }
        .graph {
            flex: 0 0 90%;
        }

        .pressure {
            color: rgb(255, 0, 0);
            flex: 1;
            display: flex;
            align-items: center;
        }
        .pouls {
            color: rgb(255, 255, 0);
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            margin-right: 20px;
        }
        .frequency {
            color: rgb(255, 255, 255);
            flex: 0 0 auto;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="constant">
        <div class="heartrate">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">120<br/>50</h2>
            <h2 class="graph_value">80</h2>
        </div>
    </div>
    <div class="constant">
        <div class="spo2">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">100<br/>90</h2>
            <h2 class="graph_value">98%</h2>
        </div>
    </div>

    <div class="constant">
        <div class="co2">
            <div class="graph">
                GRAPH PLACEHOLDER
            </div>
            <h2 class="graph_bounds">40<br/>0</h2>
            <h2 class="graph_value">40</h2>
        </div>
    </div>
    <div class="constant">
        <h2 class="pressure">TA <br/>120/80</h2>
        <div style="flex: 1;"></div>
        <h2 class="pouls">Pouls <br/>30</h2>
        <h2 class="frequency">FRVA <br/>30</h2>
    </div>
</body>
</html>
