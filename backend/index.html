<!DOCTYPE html>
<html>
<head>
    <title>Apprentissage à la défibrillation</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #2c3e50; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { margin-bottom: 40px; font-size: 2.5em; }
        .menu-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        
        /* Styling for the login card */
        .login-card { 
            background: #34495e; 
            padding: 40px; 
            border-radius: 12px; 
            text-align: center; 
            width: 300px; 
            text-decoration: none; /* Removes the underline from links */
            color: white; 
            transition: transform 0.2s, background 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        
        
        .login-card h2 { margin-top: 0; color: #ffffff; }
        .login-card p { color: #bdc3c7; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>Outil d'entrainement aux techniques de défibrillation</h1>
    
   <div class="login-card">
        <h2 class="login_text">Connectez-vous à une session</h2>
        <input type="text" name="username" placeholder="Tapez votre identifiant" id="username" required>
        <button id="login-btn" onclick="login()">Se connecter</button>
    </div>
</body>
<script>
    function login() {
        const username = document.getElementById('username').value;
        if (username) {
            // Store username in sessionStorage and redirect to loggedin page
            sessionStorage.setItem('username', username);
            window.location.href = `/loggedin?username=${encodeURIComponent(username)}`;
        } else {
            alert('Please enter a username to connect.');
        }
    }
    
    // Check if user is already logged in, redirect to loggedin page
    if (sessionStorage.getItem('username')) {
        window.location.href = `/loggedin?username=${encodeURIComponent(sessionStorage.getItem('username'))}`;
    }
</script>
</html>
