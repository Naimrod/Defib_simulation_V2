<!DOCTYPE html>
<html>
    <head>
        <title>Etat live du patient</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 30px; background: #eef2f5; color: #333; }
            h1 { text-align: center; color: #2c3e50; }
            #dashboard { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
            .sensor-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
            h2 { margin-top: 0; color: #7f8c8d; font-size: 1.2em; text-transform: uppercase; }
            .data { font-size: 1.8em; font-weight: bold; color: #e74c3c; margin-top: 15px; }
            .status { font-size: 0.9em; color: #2ecc71; margin-top: 10px; }
        </style>
    </head>
    <body>
        <div style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px; color: white; font-size: 0.9em;">
            <span>User: <strong id="current-username">Loading...</strong></span>
            <a href="/" style="margin-left: 15px; color: #e74c3c; text-decoration: none; cursor: pointer;" onclick="logout()">Logout</a>
        </div>
        <h1>Etat live du patient</h1>
        <div id="dashboard"></div>
        
        <script src="static/dashboard.js"></script>
    </body>
</html>
