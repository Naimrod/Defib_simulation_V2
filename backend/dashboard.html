<!DOCTYPE html>
<html>
    <head>
        <title>Live Medical Dashboard</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 30px; background: #eef2f5; color: #333; }
            h1 { text-align: center; color: #2c3e50; }
            #dashboard { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
            .sensor-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
            h2 { margin-top: 0; color: #7f8c8d; font-size: 1.2em; text-transform: uppercase; }
            .data { font-size: 1.8em; font-weight: bold; color: #e74c3c; margin-top: 15px; }
            .status { font-size: 0.9em; color: #2ecc71; margin-top: 10px; }
        </style>
    </head>
    <body>
        <h1>Live Medical Dashboard</h1>
        <div id="dashboard"></div>
        
        <script>
            var ws = new WebSocket("ws://127.0.0.1:8000/ws/dashboard");
            
            ws.onmessage = function(event) {
                var data = JSON.parse(event.data);
                var dashboard = document.getElementById("dashboard");
                var card = document.getElementById("card-" + data.sensor_id);
                
                if (!card) {
                    card = document.createElement("div");
                    card.id = "card-" + data.sensor_id;
                    card.className = "sensor-card";
                    
                    var title = document.createElement("h2");
                    title.innerText = "Monitor: " + data.sensor_id.replace('_', ' ');
                    
                    var content = document.createElement("div");
                    content.id = "data-" + data.sensor_id;
                    content.className = "data";
                    
                    var status = document.createElement("div");
                    status.className = "status";
                    status.innerText = "● Live Connection";
                    
                    card.appendChild(title);
                    card.appendChild(content);
                    card.appendChild(status);
                    dashboard.appendChild(card);
                }
                
                document.getElementById("data-" + data.sensor_id).innerText = data.message;
            };
        </script>
    </body>
</html>
